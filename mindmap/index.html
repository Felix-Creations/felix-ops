  .legend {

    line-height: 1.5;

  }
  .tooltip.visible { opacity: 1; }
  .tooltip strong { color: #fff; display: block; margin-bottom: 4px; }

// Layout engine
const W = window.innerWidth;
const H = window.innerHeight - 44;
const cx = W / 2;
const cy = H / 2;

// Position calculation
function layout(node, x, y, angle, depth) {
  node.x = x;
  node.y = y;
  if (!node.children) return;

  const spread = depth === 0 ? Math.PI * 2 : Math.PI * 0.75;
  const count = node.children.length;
  const startAngle = angle - spread / 2;

  const radii = [0, 200, 135, 85];
  const r = radii[depth] || 80;

  node.children.forEach((child, i) => {
    const a = count === 1 ? angle : startAngle + (spread / (count - 1)) * i;
    const cx2 = x + Math.cos(a) * r;
    const cy2 = y + Math.sin(a) * r;
    layout(child, cx2, cy2, a, depth + 1);
  });
}

// Assign angles to top-level children
function layoutRoot(root) {
  root.x = cx;
  root.y = cy;
  const count = root.children.length;
  root.children.forEach((child, i) => {
    const angle = (Math.PI * 2 / count) * i - Math.PI / 2;
    layout(child, cx + Math.cos(angle) * 230, cy + Math.sin(angle) * 180, angle, 1);
  });
}

layoutRoot(data);

// Flatten
function flatten(node, arr = []) {
  arr.push(node);
  if (node.children) node.children.forEach(c => flatten(c, arr));
  return arr;
}

function links(node, arr = []) {
  if (node.children) node.children.forEach(c => {
    arr.push({ source: node, target: c, color: node.color });
    links(c, arr);
  });
  return arr;
}

const allNodes = flatten(data);
const allLinks = links(data);

// SVG
const svg = document.getElementById('svg');
svg.setAttribute('width', W);
svg.setAttribute('height', H);
svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

// Defs — gradient bg
const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
svg.appendChild(defs);

// Pan state
let panX = 0, panY = 0, isPanning = false, startX, startY;
const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
svg.appendChild(g);

document.getElementById('canvas-wrap').addEventListener('mousedown', e => {
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  g.setAttribute('transform', `translate(${panX},${panY})`);
});
window.addEventListener('mouseup', () => isPanning = false);

// Draw links
allLinks.forEach(l => {
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const mx = (l.source.x + l.target.x) / 2;
  const my = (l.source.y + l.target.y) / 2 - 20;
  path.setAttribute('d', `M${l.source.x},${l.source.y} Q${mx},${my} ${l.target.x},${l.target.y}`);
  path.setAttribute('class', 'link');
  path.setAttribute('stroke', l.color);
  g.appendChild(path);
});

// Draw nodes
const tooltip = document.getElementById('tooltip');

allNodes.forEach(node => {
  const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  grp.setAttribute('class', 'node-group');
  grp.setAttribute('transform', `translate(${node.x},${node.y})`);

  // Glow
  const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  glow.setAttribute('r', (node.r || 16) + 6);
  glow.setAttribute('fill', node.color);
  glow.setAttribute('opacity', '0.12');
  grp.appendChild(glow);

  // Circle
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('r', node.r || 16);
  circle.setAttribute('fill', node.color);
  circle.setAttribute('class', 'node-circle');
  circle.setAttribute('opacity', '0.92');
  grp.appendChild(circle);

  // Label
  const lines = node.label.split('\n');
  lines.forEach((line, i) => {
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('class', node.id === 'root' ? 'node-label root' : (node.id.length === 2 ? 'node-label month' : 'node-label'));
    text.setAttribute('text-anchor', 'middle');
    const lineH = node.id === 'root' ? 20 : 15;
    const offsetY = lines.length > 1 ? (i - (lines.length - 1) / 2) * lineH : 0;
    text.setAttribute('y', offsetY);
    text.textContent = line;
    grp.appendChild(text);
  });

  // Tooltip
  if (node.details) {
    grp.addEventListener('mouseenter', e => {
      tooltip.innerHTML = `<strong>${node.label.replace('\n', ' ')}</strong>${node.details.replace(/\n/g, '<br>')}`;
      tooltip.classList.add('visible');
    });
    grp.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });
    grp.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
  }

  g.appendChild(grp);
});

// Resize
window.addEventListener('resize', () => {
  svg.setAttribute('width', window.innerWidth);
  svg.setAttribute('height', window.innerHeight - 44);
});
